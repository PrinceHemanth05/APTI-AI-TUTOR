<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGradient)" filter="url(#glow)"/>
  
  <!-- Inner Ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  
  <!-- AI Text -->
  <text x="100" y="118" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">AI</text>
  
  <!-- Decorative Dots -->
  <circle cx="55" cy="60" r="4" fill="white" opacity="0.6"/>
  <circle cx="145" cy="60" r="4" fill="white" opacity="0.6"/>
  <circle cx="55" cy="140" r="4" fill="white" opacity="0.6"/>
  <circle cx="145" cy="140" r="4" fill="white" opacity="0.6"/>
</svg>
